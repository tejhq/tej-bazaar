name: daily-bhavcopy

on:
  schedule:
    # 13:30 UTC = 19:00 IST, Mon–Fri. NSE bhavcopy lands ~18:00 IST,
    # BSE ~18:30 IST, so 19:00 IST gives a safety buffer.
    - cron: '30 13 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Trading date YYYY-MM-DD (defaults to today UTC→IST)'
        required: false
        default: ''

concurrency:
  group: daily-bhavcopy
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install pipeline
        run: pip install -e .

      - name: Resolve trading date (IST)
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            D="${{ github.event.inputs.date }}"
          else
            D=$(TZ=Asia/Kolkata date +%Y-%m-%d)
          fi
          echo "value=$D" >> "$GITHUB_OUTPUT"
          echo "Trading date: $D"

      - name: Fetch NSE+BSE
        run: |
          tej-bazaar fetch "${{ steps.date.outputs.value }}" \
            --exchange both \
            --out-dir data/out

      - name: Resolve current year (IST)
        id: year
        run: echo "value=$(TZ=Asia/Kolkata date +%Y)" >> "$GITHUB_OUTPUT"

      - name: Fetch corporate actions (YTD)
        # YTD rolling refresh: overwrites annual <exchange>_<year>.parquet so
        # the published file stays a single per-year artifact.
        continue-on-error: true
        run: |
          tej-bazaar actions fetch \
            --year "${{ steps.year.outputs.value }}" \
            --exchange both \
            --cache-dir data/raw/actions \
            --out-dir data/out/actions

      - name: Build symbol history
        # Walks all bhavcopy years on disk and emits per-ISIN symbol intervals.
        # Standalone artifact for downstream consumers (e.g. tej-api). The
        # `actions adjust` step uses the same algorithm in-memory from the
        # price series it already loads, so this step is independent of
        # adjust and can run in any order around it.
        continue-on-error: true
        run: |
          tej-bazaar symbol-history build \
            --exchange both \
            --prices-dir data/out \
            --out-dir data/out/symbol_history

      - name: Compute adjusted prices (all years)
        # Joins bhavcopy + actions into back-adjusted prices for EVERY year
        # on disk. All-years (not YTD) because a future bonus / split makes
        # past adjusted closes stale: a 2026 1:1 bonus retroactively halves
        # the 2024 adj_close for that ISIN. Depends on the symbol-history
        # step above for ISIN resolution.
        continue-on-error: true
        run: |
          tej-bazaar actions adjust \
            --all-years \
            --exchange both \
            --prices-dir data/out \
            --actions-dir data/out/actions \
            --out-dir data/out/prices_adjusted

      - name: Build derived metrics (all years)
        # Returns + rolling 52w/20d/60d windows. Reads adjusted parquet,
        # writes data/out/metrics/<ex>_<year>.parquet. Always full history
        # so rolling windows are seeded; output filtered per-year.
        continue-on-error: true
        run: |
          tej-bazaar metrics build \
            --all-years \
            --exchange both \
            --adjusted-dir data/out/prices_adjusted \
            --out-dir data/out/metrics

      - name: Publish to HF
        if: ${{ hashFiles('data/out/**/*.parquet') != '' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_XET: '1'
        run: |
          tej-bazaar publish \
            --repo tejhq/indian-markets \
            --data-dir data/out \
            -m "daily: ${{ steps.date.outputs.value }} NSE+BSE + actions + adjusted + symbol-history + metrics"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Daily run — ${{ steps.date.outputs.value }}"
            echo ""
            files=$(find data/out -name "*.parquet" 2>/dev/null | sort)
            if [ -n "$files" ]; then
              echo "Parquet files written:"
              echo '```'
              echo "$files"
              echo '```'
            else
              echo "_No parquet written — likely a holiday or bhavcopy not yet published._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
